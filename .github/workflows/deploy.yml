name: Deploy HRMS API Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HRMS_API_PROD_SSH_KEY }}" > ~/.ssh/github-actions
          chmod 600 ~/.ssh/github-actions
          ssh-keyscan -p 777 ${{ secrets.HRMS_API_PROD_HOST }} >> ~/.ssh/known_hosts

      # ==============================
      # Deploy ke server
      # ==============================
      - name: Create Release & Setup
        run: |
          RELEASE=$(date +%Y_%m_%d_%H%M)
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

          ssh \
            -i ~/.ssh/github-actions \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p 777 \
            ${{ secrets.HRMS_API_PROD_USER }}@${{ secrets.HRMS_API_PROD_HOST }} << EOFSETUP

          set -e

          APP_DIR=/var/www/hrms-api.test.com
          RELEASE=$RELEASE

          mkdir -p \$APP_DIR/releases
          cd \$APP_DIR/releases

          eval "\$(ssh-agent -s)"
          ssh-add ~/.ssh/hrms-api-deploy

          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:${{ github.repository }}.git \$RELEASE

          cd \$RELEASE

          # ==============================
          # Symlink .env
          # ==============================
          ln -sfn \$APP_DIR/shared/.env .env

          # ==============================
          # Shared storage
          # ==============================
          rm -rf storage
          mkdir -p \$APP_DIR/shared/storage/app/public
          mkdir -p \$APP_DIR/shared/storage/framework/sessions
          mkdir -p \$APP_DIR/shared/storage/framework/views
          mkdir -p \$APP_DIR/shared/storage/framework/cache/data
          mkdir -p \$APP_DIR/shared/storage/logs
          ln -sfn \$APP_DIR/shared/storage storage

          # ==============================
          # Symlink GCS key
          # ==============================
          mkdir -p storage/app
          ln -sfn \$APP_DIR/shared/gcs-key.json storage/app/gcs-key.json

          # ==============================
          # Shared bootstrap cache
          # ==============================
          rm -rf bootstrap/cache
          mkdir -p \$APP_DIR/shared/bootstrap/cache
          ln -sfn \$APP_DIR/shared/bootstrap/cache bootstrap/cache

          # ==============================
          # Install Composer
          # ==============================
          composer install \
            --no-dev \
            --prefer-dist \
            --optimize-autoloader \
            --no-interaction

          # ==============================
          # Laravel Optimize
          # ==============================
          php artisan cache:clear
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

          EOFSETUP

      # ==============================
      # Activate Release
      # ==============================
      - name: Activate Release
        run: |
          ssh \
            -i ~/.ssh/github-actions \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p 777 \
            ${{ secrets.HRMS_API_PROD_USER }}@${{ secrets.HRMS_API_PROD_HOST }} << EOFACTIVATE

          set -e

          APP_DIR=/var/www/hrms-api.test.com
          RELEASE=${{ env.RELEASE }}

          ln -sfn \$APP_DIR/releases/\$RELEASE \$APP_DIR/current

          cd \$APP_DIR/current

          php artisan queue:restart || true

          sudo systemctl reload php8.4-fpm || true

          cd \$APP_DIR/releases
          ls -1t | tail -n +6 | xargs -r rm -rf

          EOFACTIVATE